<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Arena - Tutorial</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ===============================
   FULLSCREEN TUTORIAL MODE
=================================*/

body{
    margin:0;
    font-family:'Courier New', monospace;
    background:linear-gradient(135deg,#000814,#001d3d);
    color:#00f5d4;
    overflow:hidden;
}

#tutorialWrapper{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

/* Progress Bar */
#progressContainer{
    width:100%;
    height:6px;
    background:#001d3d;
}

#progressBar{
    width:0%;
    height:100%;
    background:#00f5d4;
    transition:width 0.4s ease;
    box-shadow:0 0 10px #00f5d4;
}

/* Slide Area */
#slideContainer{
    flex:1;
    width:90%;
    max-width:800px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    animation:fadeIn 0.4s ease;
}

#slideTitle{
    font-size:28px;
    margin-bottom:20px;
    text-shadow:0 0 10px #00f5d4;
}

#slideContent{
    font-size:16px;
    line-height:1.6;
}

/* Quiz Buttons */
.optionBtn{
    margin-top:15px;
    padding:12px;
    width:100%;
    max-width:400px;
    background:#001d3d;
    border:1px solid #00f5d4;
    border-radius:8px;
    color:#00f5d4;
    cursor:pointer;
    transition:0.3s;
}

.optionBtn:hover{
    background:#00f5d4;
    color:#000;
}

/* Navigation */
#navButtons{
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px;
}

.navBtn{
    padding:10px 20px;
    background:#00f5d4;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
    color:#000;
}

/* Exit Button */
#exitBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:18px;
    cursor:pointer;
    color:#00f5d4;
}

/* Animation */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div id="tutorialWrapper">

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div id="exitBtn" onclick="exitTutorial()">✕ Exit</div>

    <div id="slideContainer">
        <div id="slideTitle"></div>
        <div id="slideContent"></div>
    </div>

    <div id="navButtons">
        <button class="navBtn" onclick="prevSlide()">Back</button>
        <button class="navBtn" onclick="nextSlide()">Next</button>
    </div>

</div>

<script src="js/tutorial.js"></script>

</body>
</html>
